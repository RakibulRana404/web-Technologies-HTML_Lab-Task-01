<!DOCTYPE html>
<html>
<body>
<h2>Internship Confirmation Form</h2>
<form>
Student Name:<br>
<input type="text" name="student_name" required>
<br><br>
Email Address:<br>
<input type="email" name="email" required>
<br><br>
Preferred Internship Type:<br>
<input type="radio" name="internship_type" value="On-Site"> On-Site
<br>
<input type="radio" name="internship_type" value="Remote"> Remote
<br><br>
Internship Duration:<br>
<select name="duration">
<option>6 Weeks</option>
<option>3 Months</option>
</select>
<br><br>
Skills of Interest:<br>
<input type="checkbox" name="skills" value="Web Development"> Web Development
<br>
<input type="checkbox" name="skills" value="Data Analysis"> Data Analysis
<br>
<input type="checkbox" name="skills" value="Mobile Apps"> Mobile Apps
<br><br>
<input type="submit" value="Submit">
</form>
</body>
</ht>
